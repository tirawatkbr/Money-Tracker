<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>Money Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root,[data-theme="light"]{
--bg:#f8f8f8;--bg-card:#fff;--bg-hover:#f3f3f3;--bg-input:#fafafa;--bg-badge:#f0f0f0;--bg-modal:rgba(0,0,0,0.4);
--border:#e8e8e8;--border-light:#f0f0f0;--border-focus:#c0c0c0;
--text:#1a1a1a;--text-2:#555;--text-3:#888;--text-4:#bbb;
--shadow-sm:0 1px 2px rgba(0,0,0,0.04);--shadow-md:0 2px 8px rgba(0,0,0,0.06);--shadow-lg:0 8px 30px rgba(0,0,0,0.08);--shadow-xl:0 16px 50px rgba(0,0,0,0.12);
--income:#16a34a;--income-bg:#f0fdf4;--income-border:#bbf7d0;
--expense:#dc2626;--expense-bg:#fef2f2;--expense-border:#fecaca;
--transfer:#2563eb;--transfer-bg:#eff6ff;--transfer-border:#bfdbfe;
--goal:#7c3aed;--goal-bg:#f5f3ff;--goal-border:#ddd6fe;
--warn:#d97706;--warn-bg:#fffbeb;
--radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:18px;
}
[data-theme="dark"]{
--bg:#0a0a0a;--bg-card:#141414;--bg-hover:#1c1c1c;--bg-input:#1a1a1a;--bg-badge:#222;--bg-modal:rgba(0,0,0,0.75);
--border:#2a2a2a;--border-light:#1e1e1e;--border-focus:#444;
--text:#f0f0f0;--text-2:#aaa;--text-3:#777;--text-4:#444;
--shadow-sm:0 1px 2px rgba(0,0,0,0.2);--shadow-md:0 2px 8px rgba(0,0,0,0.3);--shadow-lg:0 8px 30px rgba(0,0,0,0.4);--shadow-xl:0 16px 50px rgba(0,0,0,0.5);
--income:#22c55e;--income-bg:rgba(34,197,94,0.08);--income-border:rgba(34,197,94,0.2);
--expense:#ef4444;--expense-bg:rgba(239,68,68,0.08);--expense-border:rgba(239,68,68,0.2);
--transfer:#3b82f6;--transfer-bg:rgba(59,130,246,0.08);--transfer-border:rgba(59,130,246,0.2);
--goal:#a78bfa;--goal-bg:rgba(167,139,250,0.08);--goal-border:rgba(167,139,250,0.2);
--warn:#f59e0b;--warn-bg:rgba(245,158,11,0.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans','Segoe UI',sans-serif;min-height:100vh;padding-bottom:100px;transition:background .2s,color .2s}
button{font-family:inherit;cursor:pointer}input,select{font-family:inherit;outline:none}
.mono{font-family:'IBM Plex Mono',monospace}
.t-xl{font-size:28px;font-weight:800;letter-spacing:-.5px}.t-lg{font-size:20px;font-weight:700;letter-spacing:-.3px}
.t-md{font-size:15px;font-weight:600}.t-sm{font-size:13px;font-weight:500}.t-xs{font-size:11px;font-weight:500;letter-spacing:.3px}
.t-xxs{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3)}
.t-muted{color:var(--text-3)}.t-dim{color:var(--text-4)}.ellipsis{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;flex-shrink:0}
.icon svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.icon-lg{width:22px;height:22px}.icon-sm{width:14px;height:14px}
.container{max-width:720px;width:100%;margin:0 auto;padding:0 16px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);transition:background .2s,border-color .2s}
.card-padded{padding:16px}.row{display:flex;align-items:center;gap:8px}.row-between{display:flex;align-items:center;justify-content:space-between}
.gap-4{gap:4px}.gap-6{gap:6px}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.stack{display:flex;flex-direction:column}.scroll-x{display:flex;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.scroll-x::-webkit-scrollbar{display:none}.flex-1{flex:1;min-width:0}.shrink-0{flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--bg-card);color:var(--text);transition:all .15s}
.btn:hover{background:var(--bg-hover)}.btn-sm{padding:6px 10px;font-size:12px;border-radius:5px}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-2)}.btn-ghost:hover{background:var(--bg-hover)}
.pill{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--bg-card);color:var(--text-3);white-space:nowrap;flex-shrink:0;transition:all .12s}
.pill:hover{background:var(--bg-hover)}.pill.active{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:600}
.tab-bar{display:flex;background:var(--bg-badge);border-radius:var(--radius-md);padding:3px;gap:2px}
.tab{flex:1;padding:8px 4px;border-radius:8px;border:none;background:transparent;color:var(--text-3);font-weight:500;font-size:13px;transition:all .15s}
.tab:hover{color:var(--text-2)}.tab.active{background:var(--bg-card);color:var(--text);font-weight:700;box-shadow:var(--shadow-sm)}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;flex:1;min-width:140px;box-shadow:var(--shadow-sm)}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.stat-value{font-size:22px;font-weight:700;font-family:'IBM Plex Mono',monospace;letter-spacing:-.5px}
.stat-change{font-size:11px;font-weight:600;margin-top:4px;display:flex;align-items:center;gap:3px}.stat-change.up{color:var(--income)}.stat-change.down{color:var(--expense)}
.acc-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 16px;min-width:150px;flex-shrink:0;cursor:pointer;transition:all .15s;box-shadow:var(--shadow-sm)}
.acc-card:hover{border-color:var(--border-focus);box-shadow:var(--shadow-md)}
.tx-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius-md);cursor:pointer;transition:background .1s;border:1px solid transparent}
.tx-row:hover{background:var(--bg-hover);border-color:var(--border)}
.tx-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tx-icon.income{background:var(--income-bg);color:var(--income)}.tx-icon.expense{background:var(--expense-bg);color:var(--expense)}.tx-icon.transfer{background:var(--transfer-bg);color:var(--transfer)}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;margin-bottom:4px}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3)}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--bg-badge);color:var(--text-3)}
.goal-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;box-shadow:var(--shadow-sm);transition:all .15s}
.goal-card:hover{border-color:var(--border-focus);box-shadow:var(--shadow-md)}
.goal-progress{height:6px;background:var(--bg-badge);border-radius:3px;overflow:hidden;margin:10px 0}
.goal-bar{height:100%;border-radius:3px;transition:width .3s}
.modal-backdrop{position:fixed;inset:0;z-index:999;background:var(--bg-modal);display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .15s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-card);border-radius:var(--radius-xl);padding:24px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-xl);border:1px solid var(--border);animation:slideUp .2s ease-out}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h2{margin:0 0 16px;font-size:18px;font-weight:700}
.form-row{margin-bottom:14px}.form-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin-bottom:6px}
.form-input{width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-size:14px;transition:border-color .15s}
.form-input:focus{border-color:var(--border-focus)}.form-input.amount{font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace}
[data-theme="dark"] .form-input{color-scheme:dark}
.type-tab{flex:1;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text-3);font-weight:500;font-size:13px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.type-tab.active-income{border-color:var(--income);background:var(--income-bg);color:var(--income);font-weight:700}
.type-tab.active-expense{border-color:var(--expense);background:var(--expense-bg);color:var(--expense);font-weight:700}
.type-tab.active-transfer{border-color:var(--transfer);background:var(--transfer-bg);color:var(--transfer);font-weight:700}
.cat-btn{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text-3);font-size:12px;font-weight:500;transition:all .12s}
.cat-btn:hover{background:var(--bg-hover)}
.cat-btn.active-income{border-color:var(--income);background:var(--income-bg);color:var(--income);font-weight:600}
.cat-btn.active-expense{border-color:var(--expense);background:var(--expense-bg);color:var(--expense);font-weight:600}
.cat-btn.active-transfer{border-color:var(--transfer);background:var(--transfer-bg);color:var(--transfer);font-weight:600}
.cat-btn.active-goal{border-color:var(--goal);background:var(--goal-bg);color:var(--goal);font-weight:600}
.fab-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:50;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:6px;box-shadow:var(--shadow-lg)}
.fab{border:none;border-radius:var(--radius-md);padding:10px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;transition:opacity .15s}
.fab:hover{opacity:.85}.fab-income{background:var(--income);color:#fff}.fab-expense{background:var(--expense);color:#fff}
.fab-transfer{background:var(--transfer);color:#fff}.fab-slip{background:var(--bg-hover);color:var(--text);border:1px solid var(--border)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg-card);color:var(--text);border:1px solid var(--border);padding:10px 18px;border-radius:var(--radius-md);font-size:13px;font-weight:600;z-index:1000;box-shadow:var(--shadow-lg);animation:toastIn .2s ease-out;max-width:90%}
@keyframes toastIn{from{transform:translate(-50%,20px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
.toast.success{border-color:var(--income);color:var(--income)}.toast.error{border-color:var(--expense);color:var(--expense)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-header{font-size:11px;color:var(--text-4);text-align:center;padding:6px 0;font-weight:600}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-3);border:1px solid transparent;position:relative;transition:all .1s}
.cal-day:hover{background:var(--bg-hover)}.cal-day.today{border-color:var(--text);color:var(--text);font-weight:700}
.cal-day.selected{background:var(--text);color:var(--bg);font-weight:700;border-color:var(--text)}
.cal-day.has-data::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--text-4)}
.cal-day.has-income::after{background:var(--income)}.cal-day.has-expense::after{background:var(--expense)}
.cal-day.has-both::after{background:var(--text);width:8px;border-radius:2px}
.cal-month-btn{padding:14px 8px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--bg-card);color:var(--text-3);cursor:pointer;font-size:13px;font-weight:500;text-align:center;transition:all .1s}
.cal-month-btn:hover{background:var(--bg-hover)}.cal-month-btn.current{border-color:var(--text);color:var(--text);font-weight:700}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.slip-preview{width:100%;max-height:200px;object-fit:contain;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--bg-input);display:block}
.theme-toggle{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg-card);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;color:var(--text-2)}
.theme-toggle:hover{background:var(--bg-hover);color:var(--text)}
.drag-handle{padding:4px 2px;color:var(--text-4);user-select:none;flex-shrink:0;display:flex;align-items:center}
.acc-row{display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:var(--radius-md);background:var(--bg-card);border:1px solid var(--border);transition:transform .12s,opacity .12s,background .15s,border-color .15s;cursor:grab}
.acc-row:active{cursor:grabbing}
.acc-row.dragging{opacity:.35;transform:scale(.98)}
.acc-row.drag-over{background:var(--bg-hover);border-color:var(--text);border-style:dashed}
.cat-del{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text-3);cursor:pointer;transition:all .12s;padding:0}
.cat-del:hover{background:var(--expense-bg);color:var(--expense);border-color:var(--expense-border)}
canvas{max-width:100%}.empty{text-align:center;padding:40px 16px;color:var(--text-4)}
.bw-icon{filter:grayscale(1) brightness(1.2) contrast(0.9);display:inline-block}
[data-theme="dark"] .bw-icon{filter:grayscale(1) brightness(1.4) contrast(0.9)}
.sync-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--text-4);margin-right:4px;vertical-align:middle}
.sync-dot.synced{background:var(--income)}.sync-dot.syncing{background:var(--warn);animation:pulse 1s infinite}.sync-dot.error{background:var(--expense)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.save-btn{flex:2;padding:10px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}.save-btn:hover{opacity:.9}
/* ── RESPONSIVE ── */
/* Small phones */
@media(max-width:380px){
  .container{padding:0 12px}
  .fab{padding:8px 11px;font-size:11px;gap:4px}
  .fab-bar{gap:4px;padding:4px;width:calc(100% - 16px);justify-content:center}
  .fab span:not(.icon){display:none}
  .stat-card{min-width:115px;padding:12px}
  .stat-value{font-size:18px}
  .acc-card{min-width:130px;padding:10px 12px}
  .modal{padding:18px}
  .t-lg{font-size:18px}
  .tx-row{padding:10px 12px;gap:10px}
  .tx-icon{width:32px;height:32px}
}
/* Standard phones */
@media(min-width:381px) and (max-width:600px){
  .fab-bar{width:calc(100% - 24px);justify-content:center}
  .stat-card{min-width:140px}
}
/* Tablets */
@media(min-width:601px) and (max-width:900px){
  .container{max-width:600px}
  .fab-bar{bottom:24px}
}
/* Desktop — wider layout, grid stat cards */
@media(min-width:901px){
  body{padding-bottom:40px}
  .container{max-width:840px;padding:0 24px}
  .desktop-stats{display:grid !important;grid-template-columns:repeat(3,1fr);gap:12px;overflow:visible !important}
  .desktop-stats .stat-card{min-width:0}
  .desktop-accounts{flex-wrap:wrap;overflow:visible !important}
  .fab-bar{bottom:28px}
  .modal{max-width:520px}
}
/* Desktop account cards flex to fill */
@media(min-width:901px){
  .desktop-accounts .acc-card{flex:1 1 140px;min-width:140px}
}
/* Large desktop */
@media(min-width:1200px){
  .container{max-width:960px}
}
/* Landscape phones — compact vertical spacing */
@media(max-height:480px) and (orientation:landscape){
  .fab-bar{bottom:8px;padding:4px}
  .fab{padding:6px 10px}
  body{padding-bottom:70px}
}
/* Touch targets — ensure min 44px tap area on touch devices */
@media(hover:none){
  .btn-sm{min-height:34px}
  .pill{min-height:32px}
  .tab{min-height:38px}
}
</style>
</head>

<div id="app"></div>
<div id="modal-layer"></div>
<script>
const ICONS={

chevL:'<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>',
chevR:'<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>',
chevDown:'<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>',
chevUp:'<svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>',

async function runSlipScan(u){
  const b64=u.split(",")[1];

  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mt,data:b64}},{type:"text",text:SLIP_PROMPT}]}]})});

      const t=d.content?.map(c=>c.text||"").join("")||"";
      state.slipResult=parseSlipJson(t);
      detectTypeFromSlip(state.slipResult);
      state.slipStep="review";renderModalLayer();return;
    }
  }catch(e){/* expected to fail outside Claude */}

  // --- 2. Try Gemini API (needs user key, works anywhere) ---
  if(state.geminiApiKey&&state.geminiApiKey.trim()){
    const key=state.geminiApiKey.trim();
    // Gemini renames models often — try several, newest first
    const models=["gemini-2.0-flash","gemini-2.0-flash-exp","gemini-1.5-flash","gemini-1.5-flash-latest","gemini-flash-latest"];
    for(const model of models){
      try{
        const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:mt,data:b64}},{text:SLIP_PROMPT}]}],generationConfig:{temperature:0.1,maxOutputTokens:2048}})
        });
        if(!r.ok){
          let msg="HTTP "+r.status;
          try{const err=await r.json();msg=err.error?.message||msg;}catch{}
          lastError=msg;
          // 404 = model name wrong, try next model. Other errors = stop.
          if(r.status===404)continue;
          break;
        }
        const d=await r.json();
        const cand=d.candidates?.[0];
        if(!cand){lastError="Empty response from Gemini";break;}
        if(cand.finishReason==="SAFETY"){lastError="Blocked by Gemini safety filter";break;}
        const txt=cand.content?.parts?.map(p=>p.text||"").join("")||"";
        if(!txt){lastError="Gemini returned no text";break;}
        state.slipResult=parseSlipJson(txt);
        detectTypeFromSlip(state.slipResult);
        state.slipStep="review";renderModalLayer();return;
      }catch(e){lastError=e.message||"Network error";}
    }
  }else{
    lastError="No Gemini API key set";
  }

  // --- 3. Everything failed → manual mode, show WHY ---
  console.error("Slip scan failed:",lastError);
  toast("Scan failed: "+lastError,"error");
  state.slipScanError=lastError;
  state.slipStep="manual";state.fType="expense";state.fAmount="";state.fCat="";state.fNote="";state.fDate=todayStr();
  state.fAccount=state.accounts[0]?.id||"";state.fToAccount=state.accounts.length>1?state.accounts[1].id:"";state.fGoalId="";
  renderModalLayer();
}

/* Generic drag-and-drop reorder.
   selector: CSS selector for draggable rows
   idAttr: dataset attribute holding the item id
   onReorder: callback(draggedId, targetId)
   The WHOLE row is the drag target, not just a handle. */
function attachDragReorder(selector,idAttr,onReorder){
  const rows=document.querySelectorAll(selector);
  rows.forEach(row=>{
    const id=row.dataset[idAttr];
    if(!id)return;
    row.setAttribute("draggable","true");

    // ---- Desktop HTML5 drag ----
    row.addEventListener("dragstart",e=>{
      state.dragId=id;
      e.dataTransfer.effectAllowed="move";
      try{e.dataTransfer.setData("text/plain",id);}catch{}
      // slight delay so the drag image captures the un-faded card
      setTimeout(()=>row.classList.add("dragging"),0);
    });
    row.addEventListener("dragend",()=>{
      state.dragId=null;
      rows.forEach(r=>r.classList.remove("dragging","drag-over"));
    });
    row.addEventListener("dragover",e=>{
      if(!state.dragId||state.dragId===id)return;
      e.preventDefault();
      e.dataTransfer.dropEffect="move";
      rows.forEach(r=>r.classList.remove("drag-over"));
      row.classList.add("drag-over");
    });
    row.addEventListener("dragleave",()=>{row.classList.remove("drag-over");});
    row.addEventListener("drop",e=>{
      e.preventDefault();
      if(state.dragId&&state.dragId!==id)onReorder(state.dragId,id);
    });

    // ---- Touch drag (mobile) ----
    let touchTarget=null,touchActive=false,startY=0,longPressTimer=null;
    row.addEventListener("touchstart",e=>{
      startY=e.touches[0].clientY;
      // long-press (180ms) to start dragging, so normal taps/scrolls still work
      longPressTimer=setTimeout(()=>{
        touchActive=true;state.dragId=id;
        row.classList.add("dragging");
        if(navigator.vibrate)try{navigator.vibrate(15);}catch{}
      },180);
    },{passive:true});
    row.addEventListener("touchmove",e=>{
      if(!touchActive){
        // if finger moved a lot before long-press fired, it's a scroll — cancel
        if(Math.abs(e.touches[0].clientY-startY)>10){clearTimeout(longPressTimer);}
        return;
      }
      e.preventDefault();
      const t=e.touches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const card=el&&el.closest?el.closest(selector):null;
      const oi=card?card.dataset[idAttr]:null;
      rows.forEach(r=>r.classList.remove("drag-over"));
      if(oi&&oi!==id){card.classList.add("drag-over");touchTarget=oi;}
      else touchTarget=null;
    },{passive:false});
    const endTouch=()=>{
      clearTimeout(longPressTimer);
      if(touchActive&&touchTarget&&touchTarget!==state.dragId)onReorder(state.dragId,touchTarget);
      touchActive=false;state.dragId=null;touchTarget=null;
      rows.forEach(r=>r.classList.remove("dragging","drag-over"));
    };
    row.addEventListener("touchend",endTouch);
    row.addEventListener("touchcancel",endTouch);
  });
}

function reorderCategory(draggedKey,targetKey){

}

/* Modal layer renders independently of the main page —
   opening/closing/updating a modal never re-renders the page behind it. */
let _activeModal=null;
function currentModalKey(){
  if(state.showAdd)return"add";if(state.showAccMgr)return"accmgr";if(state.showAccForm)return"accform";
  if(state.showGoals)return"goals";if(state.showGoalForm)return"goalform";if(state.showContribute)return"contribute";
  if(state.showFilter)return"filter";if(state.showChart)return"chart";if(state.showBackup)return"backup";
  if(state.showSlip)return"slip";if(state.showCalendar)return"calendar";if(state.showSettings)return"settings";
  return null;
}
function renderModalLayer(){
  const bal=getAccBalances();
  const totBal=Object.values(bal).reduce((s,v)=>s+v,0);
  const layer=document.getElementById("modal-layer");
  if(!layer)return;
  const key=currentModalKey();
  const sameModal=key!==null&&key===_activeModal;
  layer.innerHTML=renderModals(bal,totBal);
  // Only play the open animation when a DIFFERENT modal opens — not on inner updates.
  // This kills the blink/flash when interacting inside an already-open modal.
  if(sameModal){
    layer.querySelectorAll(".modal-backdrop,.modal").forEach(el=>{el.style.animation="none";});
  }
  _activeModal=key;
  layer.querySelectorAll(".modal-backdrop").forEach(b=>{b.addEventListener("click",e=>{if(e.target===b)closeAllModals();});});
  if(state.showAccMgr)attachDragHandlers();
  if(state.showSettings)attachDragHandlers();
  if(state.showChart)setTimeout(renderCharts,30);
}

function renderCalendarInner(){const tP=parseDate(todayStr());let content="";
if(state.calView==="month"){const y=state.calYear,m=state.calMonth;const dim=new Date(y,m,0).getDate();const fd=new Date(y,m-1,1).getDay();const dm=getCalDayMap(y,m);const sP=parseDate(state.selDate);
content=`<div class="row-between" style="margin-bottom:14px"><button class="btn btn-sm btn-ghost" onclick="calNavMonth(-1)">${icon("chevL")}</button><div style="text-align:center;cursor:pointer" onclick="switchCalView('year')"><div class="t-md">${MONTHS[m-1]} ${y}</div><div class="t-xxs">tap for year</div></div><button class="btn btn-sm btn-ghost" onclick="calNavMonth(1)">${icon("chevR")}</button></div>
<div class="cal-grid">${["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>`<div class="cal-header">${d}</div>`).join("")}${'<div></div>'.repeat(fd)}${Array.from({length:dim},(_,i)=>{const day=i+1;const ds=`${y}-${pad(m)}-${pad(day)}`;const isT=y===tP.year&&m===tP.month&&day===tP.day;const isS=y===sP.year&&m===sP.month&&day===sP.day;const dd=dm[day];let dc="";if(dd){if(dd.income&&dd.expense)dc="has-data has-both";else if(dd.income)dc="has-data has-income";else if(dd.expense)dc="has-data has-expense";}return`<div class="cal-day ${isT?'today':''} ${isS?'selected':''} ${dc}" onclick="calJumpToDay('${ds}')">${day}</div>`;}).join("")}</div>
<div class="row gap-8" style="justify-content:center;margin-top:12px"><span class="t-xs t-muted"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--income)"></span> income</span><span class="t-xs t-muted"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--expense)"></span> expense</span></div>`;}
else if(state.calView==="year"){const y=state.calYear;const t=getCalMonthTotals(y);const now=new Date();
content=`<div class="row-between" style="margin-bottom:14px"><button class="btn btn-sm btn-ghost" onclick="calSetYear(state.calYear-1)">${icon("chevL")}</button><div style="text-align:center;cursor:pointer" onclick="switchCalView('decade')"><div class="t-md">${y}</div><div class="t-xxs">tap for all years</div></div><button class="btn btn-sm btn-ghost" onclick="calSetYear(state.calYear+1)">${icon("chevR")}</button></div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">${MONTHS.map((mn,i)=>{const m=i+1;const mt=t[m];const isC=y===now.getFullYear()&&m===now.getMonth()+1;const net=mt.income-mt.expense;return`<button class="cal-month-btn ${isC?'current':''}" onclick="calSetMonthView(${y},${m})">${mn}<div class="mono" style="font-size:9px;margin-top:3px;color:${mt.count?(net>=0?'var(--income)':'var(--expense)'):'var(--text-4)'}">${mt.count?(net>=0?'+':'')+fmt(net):'—'}</div></button>`;}).join("")}</div>
<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)"><div class="t-xxs" style="margin-bottom:6px">Jump to month</div><div class="row gap-4" style="flex-wrap:wrap">${MONTHS.map((mn,i)=>{const m=i+1;if(t[m].count===0)return'';return`<button class="pill" onclick="calJumpToMonth(${y},${m})">${mn} ${y}</button>`;}).join("")}</div></div>`;}
else{const yt=getCalYearTotals();const ys=Object.keys(yt).map(Number);const mn=ys.length?Math.min(...ys):new Date().getFullYear()-2;const mx=Math.max(new Date().getFullYear(),ys.length?Math.max(...ys):new Date().getFullYear());const arr=[];for(let y=mn;y<=mx;y++)arr.push(y);
content=`<div style="text-align:center;margin-bottom:14px"><div class="t-md">${mn} — ${mx}</div><div class="t-xxs">All years with data</div></div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">${arr.map(y=>{const t=yt[y];const isC=y===new Date().getFullYear();if(!t)return`<button class="cal-month-btn ${isC?'current':''}" onclick="calSetYearView(${y})">${y}<div class="mono" style="font-size:9px;margin-top:3px;color:var(--text-4)">—</div></button>`;const net=t.income-t.expense;return`<button class="cal-month-btn ${isC?'current':''}" onclick="calSetYearView(${y})">${y}<div class="mono" style="font-size:9px;margin-top:3px;color:${net>=0?'var(--income)':'var(--expense)'}">${net>=0?'+':''}${fmt(net)}</div><div class="t-xxs" style="margin-top:2px">${t.count} tx</div></button>`;}).join("")}</div>
<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)"><div class="t-xxs" style="margin-bottom:6px">Jump to year</div><div class="row gap-4" style="flex-wrap:wrap">${arr.filter(y=>yt[y]?.count>0).map(y=>`<button class="pill" onclick="calJumpToYear(${y})">${y}</button>`).join("")}</div></div>`;}
return`<div class="row-between" style="margin-bottom:12px"><h2 style="margin:0">${icon("calendar")} Calendar</h2><button class="btn btn-sm" onclick="goToToday();state.showCalendar=false">Today</button></div>
<div class="tab-bar" style="margin-bottom:14px"><button class="tab ${state.calView==='month'?'active':''}" onclick="switchCalView('month')">Days</button><button class="tab ${state.calView==='year'?'active':''}" onclick="switchCalView('year')">Months</button><button class="tab ${state.calView==='decade'?'active':''}" onclick="switchCalView('decade')">Years</button></div>
${content}<button class="btn" onclick="state.showCalendar=false;renderModalLayer()" style="width:100%;margin-top:14px">Close</button>`;}

function renderCatList(type){
  const list=type==="income"?state.incomeCats:state.expenseCats;
  const accent=type==="income"?"var(--income)":"var(--expense)";
  const accentBg=type==="income"?"var(--income-bg)":"var(--expense-bg)";
  const ic=type==="income"?"arrowUp":"arrowDown";
  if(list.length===0)return`<div class="empty" style="padding:20px"><div class="t-xs t-muted">No categories</div></div>`;
  return list.map(c=>{
    const inUse=state.records.filter(r=>r.type===type&&r.cat===c).length;
    const safe=escapeHtml(c).replace(/'/g,"\\'");
    const key=type+":"+escapeHtml(c).replace(/"/g,"&quot;");
    return`<div class="acc-row cat-row" data-cat-id="${key}" style="padding:10px 12px;margin-bottom:6px">
      <div class="drag-handle">${icon("grip")}</div>
      <div class="tx-icon shrink-0" style="width:30px;height:30px;background:${accentBg};color:${accent}">${icon(ic,"icon-sm")}</div>
      <span class="flex-1 t-sm ellipsis">${escapeHtml(c)}</span>
      ${inUse>0?`<span class="badge shrink-0">${inUse} used</span>`:''}
      <button class="cat-del shrink-0" onclick="deleteCategory('${type}','${safe}')" title="Delete">${icon("trash","icon-sm")}</button>
    </div>`;
  }).join("");
}

/* Smooth settings update — only swaps inner content, no full-page re-render */
function updateSettings(){const c=document.getElementById("settings-inner");if(c){c.innerHTML=renderSettingsInner();attachDragHandlers();}else render();}
function setCatTab(t){state.newCatType=t;updateSettings();}

function renderSettingsModal(){
  return`<div class="modal-backdrop"><div class="modal" onclick="event.stopPropagation()">
    <h2>${icon("settings")} Settings</h2>
    <div id="settings-inner">${renderSettingsInner()}</div>
  </div></div>`;
}

function renderSettingsInner(){
  const type=state.newCatType;
  const list=type==="income"?state.incomeCats:state.expenseCats;
  const typeLabel=type==="income"?"Income":"Expense";
  return`
    <div class="t-xs t-muted" style="margin-bottom:12px">Customize the categories you use when adding transactions.</div>

    <div class="tab-bar" style="margin-bottom:14px">
      <button class="tab ${type==='income'?'active':''}" onclick="setCatTab('income')">Income</button>
      <button class="tab ${type==='expense'?'active':''}" onclick="setCatTab('expense')">Expense</button>
    </div>

    <div class="card card-padded" style="margin-bottom:14px">
      <div class="t-sm" style="margin-bottom:4px">Add ${typeLabel} Category</div>
      <div class="t-xs t-muted" style="margin-bottom:12px">Type a name and tap Add</div>
      <div class="row gap-6">
        <input type="text" class="form-input flex-1" placeholder="New ${typeLabel.toLowerCase()} category…" value="${escapeHtml(state.newCatName)}" oninput="state.newCatName=this.value" onkeydown="if(event.key==='Enter')addCategory()">
        <button class="btn btn-primary shrink-0" onclick="addCategory()">${icon("plus","icon-sm")} Add</button>
      </div>
    </div>

    <div class="card card-padded" style="margin-bottom:14px">
      <div class="row-between" style="margin-bottom:4px">
        <div class="t-sm">${typeLabel} Categories</div>
        <span class="badge">${list.length}</span>
      </div>
      <div class="t-xs t-muted" style="margin-bottom:12px">Drag to reorder · tap trash to remove</div>
      ${renderCatList(type)}
    </div>

    <div class="card card-padded" style="margin-bottom:14px">
      <div class="t-sm" style="margin-bottom:4px">Reset</div>
      <div class="t-xs t-muted" style="margin-bottom:12px">Restore the original default categories for both types</div>
      <button class="btn" onclick="resetCategories()" style="width:100%">Reset Categories to Defaults</button>
    </div>

    <button class="btn btn-primary" onclick="state.showSettings=false;renderModalLayer()" style="width:100%">Done</button>
  `;
}

let charts={};
function chartOpts(){const dark=state.theme==="dark";return{text:dark?"#aaa":"#888",grid:dark?"#2a2a2a":"#f0f0f0",tip:dark?"#1c1c1c":"#fff",tipText:dark?"#f0f0f0":"#1a1a1a"};}
function destroyChart(key){
  // Destroy our tracked chart AND any Chart.js instance still bound to that canvas
  if(charts[key]){try{charts[key].destroy();}catch{}charts[key]=null;}
}
function destroyChartByCanvas(id){
  const cv=document.getElementById(id);
  if(cv&&typeof Chart!=="undefined"&&Chart.getChart){
    const existing=Chart.getChart(cv);
    if(existing){try{existing.destroy();}catch{}}
  }
}
function renderInlineChart(){
  const cv=document.getElementById("inline-chart");
  if(!cv||typeof Chart==="undefined")return;
  destroyChart("inline");destroyChartByCanvas("inline-chart");
  const data=state.view==="Year"?getMonthlyTrend():getDailyTrend();
  if(!data.length)return;const o=chartOpts();
  charts.inline=new Chart(cv,{type:"bar",data:{labels:data.map(d=>d.name),datasets:[{label:"Income",data:data.map(d=>d.income),backgroundColor:"rgba(34,197,94,0.7)",borderRadius:3,barPercentage:0.7},{label:"Expense",data:data.map(d=>d.expense),backgroundColor:"rgba(239,68,68,0.7)",borderRadius:3,barPercentage:0.7}]},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false},tooltip:{backgroundColor:o.tip,titleColor:o.tipText,bodyColor:o.tipText,borderColor:o.grid,borderWidth:1}},scales:{x:{ticks:{color:o.text,font:{size:9}},grid:{display:false}},y:{ticks:{color:o.text,font:{size:9}},grid:{color:o.grid}}}}});
}
function renderCharts(){
  if(typeof Chart==="undefined")return;
  const o=chartOpts();const f=getFiltered();const cb=getCatBreakdown(f);
  const tc=document.getElementById("trend-chart");
  if(tc){
    destroyChart("trend");destroyChartByCanvas("trend-chart");
    const data=state.view==="Year"?getMonthlyTrend():getDailyTrend();
    if(data.length)charts.trend=new Chart(tc,{type:"bar",data:{labels:data.map(d=>d.name),datasets:[{label:"Income",data:data.map(d=>d.income),backgroundColor:"rgba(34,197,94,0.75)",borderRadius:4},{label:"Expense",data:data.map(d=>d.expense),backgroundColor:"rgba(239,68,68,0.75)",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{labels:{color:o.text,font:{size:11}}},tooltip:{backgroundColor:o.tip,titleColor:o.tipText,bodyColor:o.tipText,borderColor:o.grid,borderWidth:1}},scales:{x:{ticks:{color:o.text,font:{size:9}},grid:{display:false}},y:{ticks:{color:o.text,font:{size:9}},grid:{color:o.grid}}}}});
  }
  const ep=document.getElementById("exp-pie");const exp=cb.filter(c=>c.expense>0);
  if(ep&&exp.length){
    destroyChart("exp");destroyChartByCanvas("exp-pie");
    charts.exp=new Chart(ep,{type:"doughnut",data:{labels:exp.map(c=>c.name),datasets:[{data:exp.map(c=>c.expense),backgroundColor:CAT_PALETTE,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false},tooltip:{backgroundColor:o.tip,titleColor:o.tipText,bodyColor:o.tipText,borderColor:o.grid,borderWidth:1}}}});
  }
  const ip=document.getElementById("inc-pie");const inc=cb.filter(c=>c.income>0);
  if(ip&&inc.length){
    destroyChart("inc");destroyChartByCanvas("inc-pie");
    charts.inc=new Chart(ip,{type:"doughnut",data:{labels:inc.map(c=>c.name),datasets:[{data:inc.map(c=>c.income),backgroundColor:CAT_PALETTE.slice(3).concat(CAT_PALETTE.slice(0,3)),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false},tooltip:{backgroundColor:o.tip,titleColor:o.tipText,bodyColor:o.tipText,borderColor:o.grid,borderWidth:1}}}});
  }
}

async function init(){
document.documentElement.setAttribute("data-theme",state.theme);
const d=await loadData();state.records=d.records;state.accounts=d.accounts;state.goals=d.goals;
await loadSyncConfig();await loadSlipConfig();await loadCounterpartyMap();await loadSettings();
render();
}
init();
</script>
</body>
